    <!-- inner ears -->
    <path d="M 268 208 C 292 226 312 250 322 276 C 296 280 270 270 254 250 C 246 236 252 220 268 208 Z" fill="url(#ear)"/>
    <path d="M 502 190 C 514 216 518 244 512 270 C 488 262 470 244 462 220 C 466 204 482 192 502 190 Z" fill="url(#ear)"/>

    <!-- tail tip: layered white fur, tucked near the chest -->
