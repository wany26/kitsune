             C 330 600 322 566 332 532
             C 344 544 354 566 356 588
             C 368 566 372 542 366 518
             C 382 528 394 550 396 574
             C 410 554 414 530 406 506
             C 424 516 436 538 438 562
             C 448 536 448 508 436 484
             C 428 522 412 552 384 574
             C 400 578 416 588 428 526
             C 424 566 396 600 350 626 Z"
