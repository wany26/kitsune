<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2436"/>
      <stop offset="1" stop-color="#0c0f15"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.34" r="0.62">
      <stop offset="0" stop-color="#4f8cff" stop-opacity="0.32"/>
      <stop offset="0.6" stop-color="#4f8cff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#4f8cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fur" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#ffab52"/>
      <stop offset="0.45" stop-color="#ff8a34"/>
      <stop offset="1" stop-color="#e2551c"/>
    </linearGradient>
    <linearGradient id="ear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff6ee"/>
      <stop offset="1" stop-color="#ffe2c4"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#glow)"/>
  <rect x="6" y="6" width="1012" height="1012" rx="226" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="3"/>

  <!-- curled fox mark -->
