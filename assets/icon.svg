             C 884 544 892 610 866 668
             C 838 730 782 764 716 764
             C 668 764 626 742 600 706
             C 616 668 646 642 690 634
             C 720 628 742 606 748 576
             C 754 542 738 512 706 496
             C 672 480 638 494 618 526
             C 600 556 566 606 508 632
             C 452 656 396 654 350 626
             C 396 600 424 566 428 526
             C 430 496 414 468 384 452
             C 340 428 296 436 264 468
             C 236 496 226 534 236 572
             C 214 546 200 512 198 476
             C 194 420 210 366 244 322
             C 232 306 224 284 230 260 Z"
