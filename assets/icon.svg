    <!-- muzzle / chest patch -->
    <path d="M 356 258 C 392 300 406 344 396 388 C 386 424 360 452 326 468
             C 300 436 292 396 302 358 C 312 320 330 288 356 258 Z"
          fill="#fff6ee" stroke-width="10"/>

    <!-- closed eye -->
    <path d="M 460 296 C 484 282 512 282 532 300 C 510 316 482 314 460 296 Z" fill="#3a1710" stroke-width="6"/>

    <!-- nose -->
    <path d="M 700 400 C 716 400 726 408 726 418 C 726 430 714 440 700 442 C 686 440 676 430 676 418 C 676 408 686 400 700 400 Z" fill="#3a1710" stroke-width="4"/>
